openapi: 3.0.3
info:
  title: B4RRHH Payroll API
  version: 0.1.0

tags:
  - name: Payroll
    description: Payroll materialized result management by business key.
  - name: PayrollCalculationRun
    description: Payroll calculation launch workflow and persisted run summary.

paths:
  /payroll/calculation-runs/launch:
    post:
      operationId: launchPayrollCalculation
      summary: Launch payroll calculation workflow synchronously
      description: Starts a synchronous payroll launch workflow for an explicit target selection. This V1 contract supports SINGLE_EMPLOYEE, EMPLOYEE_LIST, and ALL_EMPLOYEES_WITH_PRESENCE_IN_PERIOD, and requires payrollPeriodCode in YYYYMM format so the backend can resolve relevant employee presences by month overlap. For ALL_EMPLOYEES_WITH_PRESENCE_IN_PERIOD, target employees are resolved from the backend as all employees with at least one overlapping presence in the payroll month. totalCandidates represents expanded presence-based calculation units that overlap at least one day of the payroll month, not the raw number of requested or resolved employees. This endpoint coordinates launch execution and persists a calculation run; it is not the final payroll engine API.
      tags:
        - PayrollCalculationRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LaunchPayrollCalculationRequest"
      responses:
        "201":
          description: Payroll calculation run launched and completed synchronously
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollCalculationRunResponse"
        "400":
          description: Invalid launch request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"

  /payroll/calculation-runs/{runId}:
    get:
      operationId: getPayrollCalculationRunById
      summary: Get persisted payroll calculation run by technical run identifier
      tags:
        - PayrollCalculationRun
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Persisted payroll calculation run found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollCalculationRunResponse"
        "404":
          description: Payroll calculation run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"

  /payroll/calculation-runs/{runId}/messages:
    get:
      operationId: listPayrollCalculationRunMessages
      summary: List persisted operational messages for a payroll calculation run
      description: Returns persisted operational launch messages for the specified payroll calculation run, ordered by createdAt ascending and id ascending.
      tags:
        - PayrollCalculationRun
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Persisted payroll calculation run messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollCalculationRunMessagesResponse"
        "400":
          description: Invalid run identifier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"
        "404":
          description: Payroll calculation run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"

  /payrolls/invalidate-bulk:
    post:
      operationId: invalidatePayrollBulk
      summary: Bulk invalidation workflow for payroll results
      description: >
        Synchronous bulk invalidation workflow. Resolves a target employee population, expands to
        presence-based candidate units, and invalidates all existing CALCULATED payrolls for those
        units. Protected payrolls (EXPLICIT_VALIDATED or DEFINITIVE) are skipped and counted separately.
        Already NOT_VALID payrolls are also skipped without error. targetSelection semantics mirror
        those of the payroll launch endpoint. totalCandidates represents expanded presence-based units,
        not the raw number of target employees.
      tags:
        - Payroll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkInvalidatePayrollRequest"
      responses:
        "200":
          description: Bulk invalidation completed synchronously, summary returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkInvalidatePayrollResponse"
        "400":
          description: Invalid bulk invalidation request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"

  /payrolls/calculate:
    post:
      operationId: calculatePayroll
      summary: Temporary stub endpoint to materialize a payroll result
      description: Temporary pipeline-validation stub endpoint. This endpoint is not the final payroll engine API and is only used to materialize payroll results during the pre-launch phase. Clients currently provide concepts and context snapshots explicitly so the payroll vertical can be exercised end-to-end before launch orchestration, fake calculator generation, and the real calculation engine are introduced.
      tags:
        - Payroll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculatePayrollRequest"
      responses:
        "201":
          description: Payroll calculated and created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"
        "404":
          description: Employee presence not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"
        "409":
          description: Payroll recalculation is not allowed for the current status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"

  /payrolls/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/{payrollPeriodCode}/{payrollTypeCode}/{presenceNumber}:
    get:
      operationId: getPayrollByBusinessKey
      summary: Get payroll by business key
      tags:
        - Payroll
      parameters:
        - $ref: "#/components/parameters/RuleSystemCode"
        - $ref: "#/components/parameters/EmployeeTypeCode"
        - $ref: "#/components/parameters/EmployeeNumber"
        - $ref: "#/components/parameters/PayrollPeriodCode"
        - $ref: "#/components/parameters/PayrollTypeCode"
        - $ref: "#/components/parameters/PresenceNumber"
      responses:
        "200":
          description: Payroll found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollResponse"
        "404":
          description: Payroll not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"

  /payrolls/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/{payrollPeriodCode}/{payrollTypeCode}/{presenceNumber}/invalidate:
    post:
      operationId: invalidatePayroll
      summary: Invalidate payroll and mark it as NOT_VALID
      tags:
        - Payroll
      parameters:
        - $ref: "#/components/parameters/RuleSystemCode"
        - $ref: "#/components/parameters/EmployeeTypeCode"
        - $ref: "#/components/parameters/EmployeeNumber"
        - $ref: "#/components/parameters/PayrollPeriodCode"
        - $ref: "#/components/parameters/PayrollTypeCode"
        - $ref: "#/components/parameters/PresenceNumber"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvalidatePayrollRequest"
      responses:
        "200":
          description: Payroll invalidated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"
        "404":
          description: Payroll not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"
        "409":
          description: Payroll cannot be invalidated from its current status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"

  /payrolls/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/{payrollPeriodCode}/{payrollTypeCode}/{presenceNumber}/validate:
    post:
      operationId: validatePayroll
      summary: Explicitly validate payroll
      tags:
        - Payroll
      parameters:
        - $ref: "#/components/parameters/RuleSystemCode"
        - $ref: "#/components/parameters/EmployeeTypeCode"
        - $ref: "#/components/parameters/EmployeeNumber"
        - $ref: "#/components/parameters/PayrollPeriodCode"
        - $ref: "#/components/parameters/PayrollTypeCode"
        - $ref: "#/components/parameters/PresenceNumber"
      responses:
        "200":
          description: Payroll explicitly validated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"
        "404":
          description: Payroll not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"
        "409":
          description: Payroll cannot be validated from its current status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"

  /payrolls/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/{payrollPeriodCode}/{payrollTypeCode}/{presenceNumber}/finalize:
    post:
      operationId: finalizePayroll
      summary: Finalize payroll and make it definitive
      tags:
        - Payroll
      parameters:
        - $ref: "#/components/parameters/RuleSystemCode"
        - $ref: "#/components/parameters/EmployeeTypeCode"
        - $ref: "#/components/parameters/EmployeeNumber"
        - $ref: "#/components/parameters/PayrollPeriodCode"
        - $ref: "#/components/parameters/PayrollTypeCode"
        - $ref: "#/components/parameters/PresenceNumber"
      responses:
        "200":
          description: Payroll finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"
        "404":
          description: Payroll not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"
        "409":
          description: Payroll cannot be finalized from its current status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollErrorResponse"

components:
  parameters:
    RuleSystemCode:
      in: path
      name: ruleSystemCode
      required: true
      schema:
        type: string
        maxLength: 5
    EmployeeTypeCode:
      in: path
      name: employeeTypeCode
      required: true
      schema:
        type: string
        maxLength: 30
    EmployeeNumber:
      in: path
      name: employeeNumber
      required: true
      schema:
        type: string
        maxLength: 15
    PayrollPeriodCode:
      in: path
      name: payrollPeriodCode
      required: true
      schema:
        type: string
        maxLength: 30
    PayrollTypeCode:
      in: path
      name: payrollTypeCode
      required: true
      schema:
        type: string
        enum: [NORMAL, EXTRA]
        maxLength: 30
    PresenceNumber:
      in: path
      name: presenceNumber
      required: true
      schema:
        type: integer
        format: int32
        minimum: 1
    RunId:
      in: path
      name: runId
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1

  schemas:
    PayrollLaunchTargetSelectionType:
      type: string
      enum:
        - SINGLE_EMPLOYEE
        - EMPLOYEE_LIST
        - ALL_EMPLOYEES_WITH_PRESENCE_IN_PERIOD

    PayrollLaunchEmployeeTargetRequest:
      type: object
      required:
        - employeeTypeCode
        - employeeNumber
      properties:
        employeeTypeCode:
          type: string
          maxLength: 30
        employeeNumber:
          type: string
          maxLength: 15

    PayrollLaunchTargetSelectionRequest:
      type: object
      required:
        - selectionType
      description: Target selection payload. employee is required only for SINGLE_EMPLOYEE. employees is required only for EMPLOYEE_LIST. For ALL_EMPLOYEES_WITH_PRESENCE_IN_PERIOD both employee and employees must be null or omitted.
      properties:
        selectionType:
          $ref: "#/components/schemas/PayrollLaunchTargetSelectionType"
        employee:
          allOf:
            - $ref: "#/components/schemas/PayrollLaunchEmployeeTargetRequest"
          nullable: true
          description: Required when selectionType is SINGLE_EMPLOYEE.
        employees:
          type: array
          nullable: true
          description: Required when selectionType is EMPLOYEE_LIST.
          items:
            $ref: "#/components/schemas/PayrollLaunchEmployeeTargetRequest"

    LaunchPayrollCalculationRequest:
      type: object
      required:
        - ruleSystemCode
        - payrollPeriodCode
        - payrollTypeCode
        - calculationEngineCode
        - calculationEngineVersion
        - targetSelection
      properties:
        ruleSystemCode:
          type: string
          maxLength: 5
        payrollPeriodCode:
          type: string
          maxLength: 30
          description: V1 launch requires YYYYMM format to resolve relevant employee presences by monthly overlap.
        payrollTypeCode:
          type: string
          enum: [NORMAL, EXTRA]
          maxLength: 30
        calculationEngineCode:
          type: string
          maxLength: 50
        calculationEngineVersion:
          type: string
          maxLength: 50
        targetSelection:
          $ref: "#/components/schemas/PayrollLaunchTargetSelectionRequest"

    PayrollCalculationRunResponse:
      type: object
      required:
        - runId
        - status
        - ruleSystemCode
        - payrollPeriodCode
        - payrollTypeCode
        - calculationEngineCode
        - calculationEngineVersion
        - totalCandidates
        - totalEligible
        - totalClaimed
        - totalSkippedNotEligible
        - totalSkippedAlreadyClaimed
        - totalCalculated
        - totalNotValid
        - totalErrors
        - requestedAt
      properties:
        runId:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - REQUESTED
            - RUNNING
            - COMPLETED
            - COMPLETED_WITH_ERRORS
            - FAILED
        ruleSystemCode:
          type: string
        payrollPeriodCode:
          type: string
        payrollTypeCode:
          type: string
          enum: [NORMAL, EXTRA]
        calculationEngineCode:
          type: string
        calculationEngineVersion:
          type: string
        totalCandidates:
          type: integer
          format: int32
          minimum: 0
          description: Expanded candidate calculation units after presence overlap resolution for the payroll month.
        totalEligible:
          type: integer
          format: int32
          minimum: 0
        totalClaimed:
          type: integer
          format: int32
          minimum: 0
        totalSkippedNotEligible:
          type: integer
          format: int32
          minimum: 0
        totalSkippedAlreadyClaimed:
          type: integer
          format: int32
          minimum: 0
        totalCalculated:
          type: integer
          format: int32
          minimum: 0
        totalNotValid:
          type: integer
          format: int32
          minimum: 0
        totalErrors:
          type: integer
          format: int32
          minimum: 0
        requestedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true

    PayrollCalculationRunMessagesResponse:
      type: object
      required:
        - runId
        - items
      properties:
        runId:
          type: integer
          format: int64
          minimum: 1
        items:
          type: array
          items:
            $ref: "#/components/schemas/PayrollCalculationRunMessageResponse"

    PayrollCalculationRunMessageResponse:
      type: object
      required:
        - messageCode
        - severityCode
        - message
        - createdAt
      properties:
        messageCode:
          type: string
          maxLength: 100
        severityCode:
          type: string
          maxLength: 30
        message:
          type: string
          maxLength: 500
        detailsJson:
          type: string
          nullable: true
          description: JSON payload serialized as string with technical details for diagnostics.
        ruleSystemCode:
          type: string
          nullable: true
          maxLength: 5
        employeeTypeCode:
          type: string
          nullable: true
          maxLength: 30
        employeeNumber:
          type: string
          nullable: true
          maxLength: 15
        payrollPeriodCode:
          type: string
          nullable: true
          maxLength: 30
        payrollTypeCode:
          type: string
          enum: [NORMAL, EXTRA]
          nullable: true
          maxLength: 30
        presenceNumber:
          type: integer
          format: int32
          nullable: true
          minimum: 1
        createdAt:
          type: string
          format: date-time

    PayrollStatus:
      type: string
      enum:
        - NOT_VALID
        - CALCULATED
        - EXPLICIT_VALIDATED
        - DEFINITIVE

    PayrollConceptRequest:
      type: object
      required:
        - lineNumber
        - conceptCode
        - conceptLabel
        - amount
        - conceptNatureCode
        - displayOrder
      properties:
        lineNumber:
          type: integer
          format: int32
          minimum: 1
        conceptCode:
          type: string
          maxLength: 30
        conceptLabel:
          type: string
          maxLength: 200
        amount:
          type: number
          format: double
        quantity:
          type: number
          format: double
          nullable: true
        rate:
          type: number
          format: double
          nullable: true
        conceptNatureCode:
          type: string
          maxLength: 30
        originPeriodCode:
          type: string
          maxLength: 30
          nullable: true
        displayOrder:
          type: integer
          format: int32
          minimum: 1

    PayrollContextSnapshotRequest:
      type: object
      required:
        - snapshotTypeCode
        - sourceVerticalCode
        - sourceBusinessKeyJson
        - snapshotPayloadJson
      properties:
        snapshotTypeCode:
          type: string
          maxLength: 30
        sourceVerticalCode:
          type: string
          maxLength: 30
        sourceBusinessKeyJson:
          type: string
          description: JSON serialized business key of the source context.
        snapshotPayloadJson:
          type: string
          description: JSON serialized snapshot payload.

    CalculatePayrollRequest:
      type: object
      description: Temporary stub request used to materialize a payroll result during the pre-launch phase. This schema is intentionally transitional and will be replaced when the real payroll engine input contract is defined.
      required:
        - ruleSystemCode
        - employeeTypeCode
        - employeeNumber
        - payrollPeriodCode
        - payrollTypeCode
        - presenceNumber
        - status
        - calculatedAt
        - calculationEngineCode
        - calculationEngineVersion
        - concepts
        - contextSnapshots
      properties:
        ruleSystemCode:
          type: string
          maxLength: 5
        employeeTypeCode:
          type: string
          maxLength: 30
        employeeNumber:
          type: string
          maxLength: 15
        payrollPeriodCode:
          type: string
          maxLength: 30
        payrollTypeCode:
          type: string
          enum: [NORMAL, EXTRA]
          maxLength: 30
        presenceNumber:
          type: integer
          format: int32
          minimum: 1
        status:
          $ref: "#/components/schemas/PayrollStatus"
          description: Initial implementation only accepts CALCULATED or NOT_VALID for calculation output.
        statusReasonCode:
          type: string
          maxLength: 50
          nullable: true
        calculatedAt:
          type: string
          format: date-time
        calculationEngineCode:
          type: string
          maxLength: 50
        calculationEngineVersion:
          type: string
          maxLength: 50
        concepts:
          type: array
          description: Temporary stub-provided payroll concepts. In the final calculation flow these lines are expected to be produced by the payroll engine rather than sent as a stable public API payload.
          items:
            $ref: "#/components/schemas/PayrollConceptRequest"
        contextSnapshots:
          type: array
          description: Temporary stub-provided context snapshots used to persist supporting payroll context during pipeline validation. This is not the final public engine input shape.
          items:
            $ref: "#/components/schemas/PayrollContextSnapshotRequest"

    InvalidatePayrollRequest:
      type: object
      required:
        - statusReasonCode
      properties:
        statusReasonCode:
          type: string
          maxLength: 50

    BulkInvalidatePayrollRequest:
      type: object
      description: >
        Request for bulk payroll invalidation workflow. targetSelection semantics mirror those of
        the payroll launch endpoint. For ALL_EMPLOYEES_WITH_PRESENCE_IN_PERIOD, both employee and
        employees must be null or omitted. payrollPeriodCode must be in YYYYMM format.
      required:
        - ruleSystemCode
        - payrollPeriodCode
        - payrollTypeCode
        - statusReasonCode
        - targetSelection
      properties:
        ruleSystemCode:
          type: string
          maxLength: 5
        payrollPeriodCode:
          type: string
          maxLength: 30
          description: Must be in YYYYMM format. Used to resolve presence overlaps for the payroll month.
        payrollTypeCode:
          type: string
          enum: [NORMAL, EXTRA]
          maxLength: 30
        statusReasonCode:
          type: string
          maxLength: 50
          description: Reason code applied to all invalidated payrolls.
        targetSelection:
          $ref: "#/components/schemas/PayrollLaunchTargetSelectionRequest"

    BulkInvalidatePayrollResponse:
      type: object
      description: >
        Summary of a completed bulk invalidation workflow. totalCandidates counts presence-based
        expanded units, not raw target employees. totalFound counts payroll rows actually found
        for those units. Skipped counters are mutually exclusive.
      required:
        - ruleSystemCode
        - payrollPeriodCode
        - payrollTypeCode
        - totalCandidates
        - totalFound
        - totalInvalidated
        - totalSkippedAlreadyNotValid
        - totalSkippedProtected
        - totalSkippedNotFound
        - statusReasonCode
      properties:
        ruleSystemCode:
          type: string
        payrollPeriodCode:
          type: string
        payrollTypeCode:
          type: string
          enum: [NORMAL, EXTRA]
        totalCandidates:
          type: integer
          format: int32
          minimum: 0
          description: Total presence-based candidate units expanded from the target population.
        totalFound:
          type: integer
          format: int32
          minimum: 0
          description: Payroll rows found in persistence for the candidate units.
        totalInvalidated:
          type: integer
          format: int32
          minimum: 0
          description: Payrolls successfully transitioned from CALCULATED to NOT_VALID.
        totalSkippedAlreadyNotValid:
          type: integer
          format: int32
          minimum: 0
          description: Payrolls already in NOT_VALID status, skipped without error.
        totalSkippedProtected:
          type: integer
          format: int32
          minimum: 0
          description: Payrolls in EXPLICIT_VALIDATED or DEFINITIVE status, protected from bulk invalidation.
        totalSkippedNotFound:
          type: integer
          format: int32
          minimum: 0
          description: Candidate units for which no payroll row was found in persistence.
        statusReasonCode:
          type: string
          description: Status reason code applied to all invalidated payrolls.

    PayrollConceptResponse:
      allOf:
        - $ref: "#/components/schemas/PayrollConceptRequest"

    PayrollContextSnapshotResponse:
      allOf:
        - $ref: "#/components/schemas/PayrollContextSnapshotRequest"

    PayrollWarningResponse:
      type: object
      description: Functional payroll warning attached to a payroll result. Distinct from launch/run operational messages.
      required:
        - warningCode
        - severityCode
        - message
      properties:
        warningCode:
          type: string
          maxLength: 50
        severityCode:
          type: string
          maxLength: 20
          description: Intended severities are INFO, WARNING, and ERROR.
        message:
          type: string
          maxLength: 500
        detailsJson:
          type: string
          nullable: true

    PayrollResponse:
      type: object
      required:
        - ruleSystemCode
        - employeeTypeCode
        - employeeNumber
        - payrollPeriodCode
        - payrollTypeCode
        - presenceNumber
        - status
        - calculatedAt
        - calculationEngineCode
        - calculationEngineVersion
        - warnings
        - concepts
        - contextSnapshots
      properties:
        ruleSystemCode:
          type: string
        employeeTypeCode:
          type: string
        employeeNumber:
          type: string
        payrollPeriodCode:
          type: string
        payrollTypeCode:
          type: string
          enum: [NORMAL, EXTRA]
        presenceNumber:
          type: integer
          format: int32
        status:
          $ref: "#/components/schemas/PayrollStatus"
        statusReasonCode:
          type: string
          nullable: true
        calculatedAt:
          type: string
          format: date-time
        calculationEngineCode:
          type: string
        calculationEngineVersion:
          type: string
        warnings:
          type: array
          description: Functional payroll warnings attached to this payroll result.
          items:
            $ref: "#/components/schemas/PayrollWarningResponse"
        concepts:
          type: array
          items:
            $ref: "#/components/schemas/PayrollConceptResponse"
        contextSnapshots:
          type: array
          items:
            $ref: "#/components/schemas/PayrollContextSnapshotResponse"

    PayrollErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string