    get:
      operationId: getCompany
      summary: Get aggregated company by business key
      tags:
        - Company
      description: |
        Resolves the COMPANY occurrence applicable on the current server date and returns its aggregated data.
        If company_profile does not exist yet, the response falls back to base COMPANY data and empty profile fields.
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: companyCode
          required: true
          schema:
