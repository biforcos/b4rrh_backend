        "400":
          description: Invalid path parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyErrorResponse"
        "404":
          description: Company does not exist for the business key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyErrorResponse"
        "409":
          description: Company exists but is not applicable today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyErrorResponse"
    put:
      operationId: updateCompany
      summary: Update aggregated company by business key
      tags:
        - Company
      description: |
        Resolves the COMPANY occurrence applicable on the current server date and updates both
        base COMPANY mutable fields and the associated company_profile.
        If company_profile does not exist yet, this operation creates it as part of the aggregated update.
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
