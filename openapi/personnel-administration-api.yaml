      summary: Create a new cost center distribution window
      tags:
        - Employee Cost Center
      description: |
        Creates a new distribution window starting at startDate.
        Rejected if an active distribution already exists at startDate.
        To replace an existing active distribution, use replace-from-date instead.
        All items share the same startDate. Sum of allocationPercentage must be <= 100.
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
