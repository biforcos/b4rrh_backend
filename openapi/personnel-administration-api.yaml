components:
  schemas:
    PayrollLaunchTargetSelectionType:
      type: string
      enum:
        - ALL_EMPLOYEES_WITH_PRESENCE_IN_PERIOD
        - EMPLOYEE_LIST
        - SINGLE_EMPLOYEE

    PayrollLaunchEmployeeTargetRequest:
      type: object
      required:
        - employeeTypeCode
        - employeeNumber
      properties:
        employeeTypeCode:
          type: string
        employeeNumber:
          type: string

    PayrollLaunchTargetSelectionRequest:
      type: object
      required:
        - selectionType
      properties:
        selectionType:
          $ref: "#/components/schemas/PayrollLaunchTargetSelectionType"
        employee:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PayrollLaunchEmployeeTargetRequest"
        employees:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/PayrollLaunchEmployeeTargetRequest"

    LaunchPayrollCalculationRequest:
      type: object
      required:
        - ruleSystemCode
        - payrollPeriodCode
        - payrollTypeCode
        - calculationEngineCode
        - calculationEngineVersion
        - targetSelection
      properties:
        ruleSystemCode:
          type: string
        payrollPeriodCode:
          type: string
        payrollTypeCode:
          type: string
        calculationEngineCode:
          type: string
        calculationEngineVersion:
          type: string
        targetSelection:
          $ref: "#/components/schemas/PayrollLaunchTargetSelectionRequest"

    PayrollCalculationRunResponse:
      type: object
      required:
        - runId
        - status
        - ruleSystemCode
        - payrollPeriodCode
        - payrollTypeCode
        - calculationEngineCode
        - calculationEngineVersion
        - totalCandidates
        - totalEligible
        - totalClaimed
        - totalSkippedNotEligible
        - totalSkippedAlreadyClaimed
        - totalCalculated
        - totalNotValid
        - totalErrors
        - requestedAt
      properties:
        runId:
          type: integer
          format: int64
        status:
          type: string
        ruleSystemCode:
          type: string
        payrollPeriodCode:
          type: string
        payrollTypeCode:
          type: string
        calculationEngineCode:
          type: string
        calculationEngineVersion:
          type: string
        totalCandidates:
          type: integer
        totalEligible:
          type: integer
        totalClaimed:
          type: integer
        totalSkippedNotEligible:
          type: integer
        totalSkippedAlreadyClaimed:
          type: integer
        totalCalculated:
          type: integer
        totalNotValid:
          type: integer
        totalErrors:
          type: integer
        requestedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true

    BulkInvalidatePayrollRequest:
      type: object
      required:
        - ruleSystemCode
        - payrollPeriodCode
        - payrollTypeCode
        - statusReasonCode
        - targetSelection
      properties:
        ruleSystemCode:
          type: string
        payrollPeriodCode:
          type: string
        payrollTypeCode:
          type: string
        statusReasonCode:
          type: string
        targetSelection:
          $ref: "#/components/schemas/PayrollLaunchTargetSelectionRequest"

    BulkInvalidatePayrollResponse:
      type: object
      required:
        - ruleSystemCode
        - payrollPeriodCode
        - payrollTypeCode
        - totalCandidates
        - totalFound
        - totalInvalidated
        - totalSkippedAlreadyNotValid
        - totalSkippedProtected
        - totalSkippedNotFound
        - statusReasonCode
      properties:
        ruleSystemCode:
          type: string
        payrollPeriodCode:
          type: string
        payrollTypeCode:
          type: string
        totalCandidates:
          type: integer
        totalFound:
          type: integer
        totalInvalidated:
          type: integer
        totalSkippedAlreadyNotValid:
          type: integer
        totalSkippedProtected:
          type: integer
        totalSkippedNotFound:
          type: integer
        statusReasonCode:
          type: string

    HireEmployeeRequest:
      type: object
      required:
        - ruleSystemCode
        - employeeNumber
        - firstName
        - lastName1
        - hireDate
        - entryReasonCode
        - companyCode
        - workCenterCode
        - contract
        - laborClassification
        - workingTime
      properties:
