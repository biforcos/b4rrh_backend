          required: true
          schema:
            type: integer
            format: int32
      responses:
        "204":
          description: Work center assignment deleted
        "404":
          description: Rule system, employee, or work center assignment not found
        "409":
          description: >-
            Deletion is not allowed because the assignment startDate matches the startDate of
            an employee presence. The occurrence must be corrected instead of deleted.

