          description: Contact created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '400':
          description: Invalid request
        '404':
          description: Rule system, employee, or catalog not found
        '409':
          description: Contact already exists for employee and contact type
    get:
      operationId: listEmployeeContactsByBusinessKey
      summary: List employee contacts
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      responses:
        '200':
          description: Contact list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContactResponse'
        '404':
          description: Rule system or employee not found

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/contacts/{contactTypeCode}:
    get:
      operationId: getContactByBusinessKey
      summary: Get employee contact by business key
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
        - in: path
          name: contactTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
      responses:
        '200':
          description: Contact found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '404':
          description: Rule system, employee, or contact not found
    put:
      operationId: updateContactByBusinessKey
      summary: Update employee contact
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
        - in: path
          name: contactTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContactRequest'
      responses:
        '200':
          description: Contact updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '400':
          description: Invalid request
        '404':
          description: Rule system, employee, catalog, or contact not found
    delete:
      operationId: deleteContactByBusinessKey
      summary: Delete employee contact
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
        - in: path
          name: contactTypeCode
          required: true
          schema:
            type: string
