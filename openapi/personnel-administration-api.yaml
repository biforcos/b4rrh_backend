        "404":
          description: Rule entity occurrence not found
    put:
      operationId: correctRuleEntityByBusinessKey
      summary: Correct existing rule entity occurrence
      tags:
        - Rule Entities
      description: |
        Corrects mutable fields of the same occurrence identified by the full business key.
        Identity fields (ruleSystemCode, ruleEntityTypeCode, code, startDate) are immutable.
        This operation does not create a new occurrence.
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: ruleEntityTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: code
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: startDate
          required: true
          schema:
            type: string
            format: date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorrectRuleEntityRequest"
      responses:
        "200":
          description: Rule entity occurrence corrected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleEntityResponse"
        "400":
          description: Invalid request payload
        "404":
          description: Rule entity occurrence not found
        "409":
          description: Domain conflict while correcting the occurrence
    delete:
      operationId: deleteRuleEntityByBusinessKey
      summary: Delete rule entity by functional business key
      tags:
        - Rule Entities
      description: |
        Delete is allowed only when the target rule entity exists and is not referenced by business resources.
        This operation is business-key only and does not use technical identifiers.
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: ruleEntityTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: code
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: startDate
          required: true
          schema:
            type: string
            format: date
      responses:
        "204":
          description: Rule entity deleted
        "404":
          description: Rule entity not found
        "409":
          description: Rule entity is in use and cannot be deleted

