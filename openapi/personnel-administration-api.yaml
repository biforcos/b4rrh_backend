      responses:
        "201":
          description: Distribution window created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostCenterDistributionWindowResponse"
        "400":
          description: Invalid request (invalid item, sum > 100, missing fields)
        "404":
          description: Employee or catalog value not found
        "409":
          description: An active distribution window already exists at startDate, or period is outside presence

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/cost-centers/replace-from-date:
    post:
      operationId: replaceCostCenterDistributionFromDate
      summary: Replace the active cost center distribution from an effective date
      tags:
        - Employee Cost Center
      description: |
        Finds the active distribution window at effectiveDate - 1 day,
        closes all its lines at effectiveDate - 1 day,
        and creates a new window starting at effectiveDate with the provided items.
        Atomic operation. Rejected if no active window exists before effectiveDate.
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceCostCenterDistributionFromDateRequest"
      responses:
        "200":
          description: New distribution window created, previous window closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostCenterDistributionWindowResponse"
        "400":
          description: Invalid request
        "404":
          description: Employee, catalog value, or active window not found
        "409":
          description: Period is outside presence

