openapi: 3.0.3
info:
  title: B4RRHH Personnel Administration API
  version: 0.1.0

tags:
  - name: Employee Directory
    description: Employee directory queries and employee core administrative operations.
  - name: Employee Lifecycle
    description: Hire, rehire, and terminate lifecycle workflows.
  - name: Employee Journey
    description: Read-only employee journey and timeline views.
  - name: Employee Presence
    description: Employee presence occurrence management.
  - name: Employee Address
    description: Employee address occurrence management.
  - name: Employee Work Center
    description: Employee work center assignment management.
  - name: Employee Cost Center
    description: Employee cost center distribution management.
  - name: Employee Contract
    description: Employee contract occurrence management.
  - name: Employee Labor Classification
    description: Employee labor classification occurrence management.
  - name: Employee Identifier
    description: Employee identifier management.
  - name: Employee Contact
    description: Employee contact management.
  - name: Company
    description: Functional aggregated company resource backed by COMPANY rule entities and company_profile enrichment.
  - name: Company Profile
    description: Enriched company profile reads and updates backed by the COMPANY occurrence applicable on the current date.
  - name: Agreement
    description: Functional aggregated agreement resource backed by AGREEMENT rule entities and agreement_profile enrichment.
  - name: Agreement Profile
    description: Enriched agreement profile reads and updates backed by the AGREEMENT base entity with annual hours and labor terms.
  - name: Work Center
    description: Functional aggregated work center resource backed by WORK_CENTER rule entities and work_center_profile enrichment.
  - name: Work Center Contact
    description: Work center contact management anchored to the WORK_CENTER aggregated resource.
  - name: Catalogs
    description: Read-only catalog and catalog binding queries.
  - name: Rule Systems
    description: Rule system administration endpoints.
  - name: Rule Entity Types
    description: Rule entity type administration endpoints.
  - name: Rule Entities
    description: Rule entity administration endpoints.
  - name: Payroll Engine
    description: Payroll concept designer, operand/feed configuration, and assignment rule management.
  - name: Employee Payroll Input
    description: Per-employee payroll quantity inputs (overtime hours, transport units, etc.)
  - name: Payroll
    description: Payroll lifecycle operations — search, invalidate, validate, recalculate.
  - name: Payroll Calculation Run
    description: Launch and track bulk payroll calculation runs.

paths:
  /employees:
    get:
      operationId: listEmployees
      summary: List or search employees for directory reads
      tags:
        - Employee Directory
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
            maxLength: 100
          description: Free text search over employee number and name-related fields.
        - in: query
          name: ruleSystemCode
          required: false
          schema:
            type: string
            maxLength: 5
        - in: query
          name: employeeTypeCode
          required: false
          description: Optional in V1. Defaults to 'EMP' when not provided.
          schema:
            type: string
            maxLength: 30
        - in: query
          name: status
          required: false
          schema:
            type: string
            maxLength: 30
        - in: query
          name: size
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 200
          description: Page size limit. Defaults to 50.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
          description: Zero-based page index. Defaults to 0.
      responses:
        "200":
          description: Employee directory list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeDirectoryItemResponse"
        "400":
          description: Invalid query parameters
    post:
      operationId: createEmployee
      summary: Create employee
      tags:
        - Employee Directory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeRequest"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeResponse"

  /employees/hire:
    post:
      operationId: hireEmployee
      summary: Hire employee lifecycle workflow
      tags:
        - Employee Lifecycle
      description: |
        Business-oriented workflow that creates an employee and their initial lifecycle state.
        This operation creates the employee core identity, their first presence,
        initial contract, initial labor classification, and initial work center assignment
        in a single transaction using a single hireDate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HireEmployeeRequest"
      responses:
        "201":
          description: Employee hired successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HireEmployeeResponse"
        "400":
          description: Invalid request payload.
        "404":
          description: Required catalog dependency not found (rule system, company, etc).
        "409":
          description: Employee already exists.
        "422":
          description: Business validation failed (invalid catalog relation or distribution).
        default:
          description: Internal error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HireEmployeeErrorResponse"

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/terminate:
    post:
      operationId: terminateEmployee
      summary: Terminate employee lifecycle workflow
      tags:
        - Employee Lifecycle
      description: |
        Closes active presence, contract, labor classification, and work center in a single transaction
        using a single mandatory terminationDate.
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TerminateEmployeeRequest"
      responses:
        "200":
          description: Employee terminated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerminateEmployeeResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerminateEmployeeErrorResponse"
        "404":
          description: Rule system, employee, or required dependency not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerminateEmployeeErrorResponse"
        "409":
          description: Functional conflict (inconsistent active occurrences or invalid temporal coherence)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerminateEmployeeErrorResponse"
        "422":
          description: Business validation failed (for example invalid exitReasonCode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerminateEmployeeErrorResponse"

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/rehire:
    post:
      operationId: rehireEmployee
      summary: Rehire employee lifecycle workflow
      tags:
        - Employee Lifecycle
      description: |
        Reopens employee lifecycle by creating a new active presence, contract,
        labor classification, and work center assignment with a single mandatory rehireDate.
        rehireDate must be strictly later than the endDate of the latest closed presence.
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RehireEmployeeRequest"
      responses:
        "201":
          description: Employee rehired and new active cycle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RehireEmployeeResponse"
        "200":
          description: Idempotent replay resolved to existing equivalent active cycle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RehireEmployeeResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RehireEmployeeErrorResponse"
        "404":
          description: Rule system, employee, or required dependency not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RehireEmployeeErrorResponse"
        "409":
          description: Functional conflict (active lifecycle not equivalent or invalid temporal coherence)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RehireEmployeeErrorResponse"
        "422":
          description: Business validation failed (invalid catalog value or dependent relation)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RehireEmployeeErrorResponse"

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}:
    get:
      operationId: getEmployeeByBusinessKey
      summary: Get employee by business key
      tags:
        - Employee Directory
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      responses:
        "200":
          description: Employee found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeResponse"
        "404":
          description: Rule system or employee not found
    put:
      operationId: updateEmployeeByBusinessKey
      summary: Update employee core identity fields by business key
      tags:
        - Employee Directory
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeRequest"
      responses:
        "200":
          description: Employee updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeResponse"
        "400":
          description: Invalid request
        "404":
          description: Rule system or employee not found
    delete:
      operationId: deleteEmployeeByBusinessKey
      summary: Administrative delete employee by business key
      tags:
        - Employee Directory
      description: |
        Exceptional administrative operation to physically delete an employee.
        This operation is outside normal lifecycle workflows and does not replace terminate.
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      responses:
        "204":
          description: Employee deleted successfully
        "404":
          description: Employee not found

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/journey:
    get:
      operationId: getEmployeeJourney
      summary: Get aggregated employee journey timeline (read-only view)
      tags:
        - Employee Journey
      description: |
        Read-only aggregated timeline view for frontend rendering.
        This endpoint does not mutate data and does not replace canonical write verticals.
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      responses:
        "200":
          description: Frontend-friendly aggregated journey timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeJourneyTracksResponse"
        "400":
          description: Invalid business key input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyErrorResponse"
        "404":
          description: Employee not found for journey read model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyErrorResponse"

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/journey-v2:
    get:
      operationId: getEmployeeJourneyV2
      summary: Get employee journey timeline as chronological events (read-only view)
      tags:
        - Employee Journey
      description: |
        Read-only event-based timeline for employee lifecycle visualization.
        This endpoint does not mutate data and does not replace canonical write verticals.
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      responses:
        "200":
          description: Event-based employee journey timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeJourneyResponse"
        "400":
          description: Invalid business key input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyErrorResponse"
        "404":
          description: Employee not found for journey read model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyErrorResponse"

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/presences:
    post:
      operationId: createPresenceByBusinessKey
      summary: Create employee presence by business key
      tags:
        - Employee Presence
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePresenceRequest"
      responses:
        "201":
          description: Presence created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresenceResponse"
        "400":
          description: Invalid request
        "404":
          description: Rule system, employee, or catalog not found
        "409":
          description: Presence business conflict
    get:
      operationId: listEmployeePresencesByBusinessKey
      summary: List employee presences by business key
      tags:
        - Employee Presence
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      responses:
        "200":
          description: Presence list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PresenceResponse"
        "404":
          description: Rule system or employee not found

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/presences/{presenceNumber}:
    get:
      operationId: getPresenceByBusinessKey
      summary: Get employee presence by business key
      tags:
        - Employee Presence
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
        - in: path
          name: presenceNumber
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Presence found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresenceResponse"
        "404":
          description: Rule system, employee, or presence not found

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/presences/{presenceNumber}/close:
    post:
      operationId: closePresenceByBusinessKey
      summary: Close employee presence by business key
      tags:
        - Employee Presence
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
        - in: path
          name: presenceNumber
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClosePresenceRequest"
      responses:
        "200":
          description: Presence closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresenceResponse"
        "400":
          description: Invalid request
        "404":
          description: Rule system, employee, or presence not found
        "409":
          description: Presence already closed

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/addresses:
    post:
      operationId: createAddressByBusinessKey
      summary: Create employee address by business key
      tags:
        - Employee Address
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAddressRequest"
      responses:
        "201":
          description: Address created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressResponse"
        "400":
          description: Invalid request
        "404":
          description: Rule system, employee, or catalog not found
        "409":
          description: Address period overlaps for the same employee and address type
    get:
      operationId: listEmployeeAddressesByBusinessKey
      summary: List employee addresses by business key
      tags:
        - Employee Address
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      responses:
        "200":
          description: Address list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AddressResponse"
        "404":
          description: Rule system or employee not found

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/addresses/{addressNumber}:
    get:
      operationId: getAddressByBusinessKey
      summary: Get employee address by business key
      tags:
        - Employee Address
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
        - in: path
          name: addressNumber
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Address found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressResponse"
        "404":
          description: Rule system, employee, or address not found
    put:
      operationId: updateAddressByBusinessKey
      summary: Correct employee address by business key
      tags:
        - Employee Address
      description: >-
        Administrative correction of the same address occurrence identified by
        ruleSystemCode, employeeTypeCode, employeeNumber, and addressNumber.
        This operation does not create a new occurrence and does not mutate
        occurrence identity fields.
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
        - in: path
          name: addressNumber
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAddressRequest"
      responses:
        "200":
          description: Address corrected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressResponse"
        "400":
          description: Invalid request
        "404":
          description: Rule system, employee, or address not found
        "409":
          description: Domain conflict if correction is invalid

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/addresses/{addressNumber}/close:
    post:
      operationId: closeAddressByBusinessKey
      summary: Close employee address by business key
      tags:
        - Employee Address
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
        - in: path
          name: addressNumber
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseAddressRequest"
      responses:
        "200":
          description: Address closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressResponse"
        "400":
          description: Invalid request
        "404":
          description: Rule system, employee, or address not found
        "409":
          description: Address already closed

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/work-centers:
    post:
      operationId: createWorkCenterByBusinessKey
      summary: Create employee work center assignment by business key
      tags:
        - Employee Work Center
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeCreateWorkCenterRequest"
      responses:
        "201":
          description: Work center assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeWorkCenterAssignmentResponse"
        "400":
          description: Invalid request
        "404":
          description: Rule system, employee, or catalog not found
        "409":
          description: >-
            The requested period overlaps an existing work center assignment for this employee,
            or the period [startDate, endDate] is not fully contained within any of the
            employee's active presence periods.
    get:
      operationId: listEmployeeWorkCentersByBusinessKey
      summary: List employee work center assignments by business key
      tags:
        - Employee Work Center
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      responses:
        "200":
          description: Work center assignment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeWorkCenterAssignmentResponse"
        "404":
          description: Rule system or employee not found

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/work-centers/replace-from-date:
    post:
      operationId: replaceWorkCenterFromDateByBusinessKey
      summary: Replace employee work center assignment from effective date by business key
      tags:
        - Employee Work Center
      description: >-
        Canonical business operation to change employee work center assignment from an effective date.
        If an assignment covers effectiveDate, it is closed at effectiveDate - 1 and a new assignment
        starts at effectiveDate. If no assignment covers effectiveDate, a new assignment is created
        directly when the temporal context is valid.
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeReplaceWorkCenterFromDateRequest"
      responses:
        "200":
          description: Work center assignment replaced from effective date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeWorkCenterAssignmentResponse"
        "400":
          description: Invalid request
        "404":
