        "409":
          description: >-
            Work center assignment correction conflicts with temporal rules.
            Resulting period overlaps another assignment for this employee,
            is not fully contained within employee presence history,
            or references an invalid catalog value.
    delete:
      operationId: deleteWorkCenterByBusinessKey
      summary: Delete employee work center assignment by business key
      tags:
        - Employee Work Center
      description: >-
        Administrative deletion of a specific work center assignment occurrence identified by
        business keys. This operation does not represent a workflow transition and does not
        replace close. Deletion is forbidden when the assignment startDate exactly matches the
        startDate of any presence for the same employee; in that case the occurrence must be
        corrected instead of deleted.
      parameters:
