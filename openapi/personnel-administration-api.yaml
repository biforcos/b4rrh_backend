openapi: 3.0.3
info:
  title: B4RRHH Personnel Administration API
  version: 0.1.0

paths:
  /employees:
    post:
      operationId: createEmployee
      summary: Create employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployeeRequest'
      responses:
        '201':
          description: Employee created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'

components:
  schemas:
    CreateEmployeeRequest:
      type: object
      required:
        - ruleSystemCode
        - employeeNumber
        - firstName
        - lastName1
      properties:
        ruleSystemCode:
          type: string
          maxLength: 5
        employeeNumber:
          type: string
          maxLength: 15
        firstName:
          type: string
          maxLength: 100
        lastName1:
          type: string
          maxLength: 100
        lastName2:
          type: string
          maxLength: 100
          nullable: true
        preferredName:
          type: string
          maxLength: 300
          nullable: true

    EmployeeResponse:
      type: object
      required:
        - id
        - ruleSystemCode
        - employeeNumber
        - firstName
        - lastName1
        - status
      properties:
        id:
          type: integer
          format: int64
        ruleSystemCode:
          type: string
        employeeNumber:
          type: string
        firstName:
          type: string
        lastName1:
          type: string
        lastName2:
          type: string
          nullable: true
        preferredName:
          type: string
          nullable: true
        status:
          type: string